name: Sync WC Results

on:
  schedule:
    - cron: '*/5 16-23 * * *'  # 18:00–01:59 hora España (UTC+2)
    - cron: '*/5 0-5 * * *'   # 02:00–07:59 hora España (UTC+2)
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync results
        run: node scripts/sync-results.js
        env:
          FOOTBALL_DATA_TOKEN:  ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FIREBASE_ADMIN_EMAIL: ${{ secrets.FIREBASE_ADMIN_EMAIL }}
          FIREBASE_ADMIN_PASSWORD: ${{ secrets.FIREBASE_ADMIN_PASSWORD }}
