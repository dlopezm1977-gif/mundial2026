<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c"><circle cx="256" cy="256" r="206"/></clipPath>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" rx="80" fill="#0a0e1a"/>

  <!-- Esfera -->
  <circle cx="256" cy="256" r="206" fill="#0f1628"/>

  <!-- Paralelos y meridianos (globo/pelota), recortados a la esfera -->
  <g clip-path="url(#c)" stroke="#e8c84a" stroke-width="3" fill="none" opacity="0.35">
    <!-- Paralelos -->
    <ellipse cx="256" cy="143" rx="178" ry="24"/>
    <ellipse cx="256" cy="204" rx="201" ry="26"/>
    <ellipse cx="256" cy="308" rx="201" ry="26"/>
    <ellipse cx="256" cy="369" rx="178" ry="24"/>
    <!-- Meridianos -->
    <ellipse cx="163" cy="256" rx="26" ry="206"/>
    <ellipse cx="256" cy="256" rx="27" ry="206"/>
    <ellipse cx="349" cy="256" rx="26" ry="206"/>
  </g>

  <!-- Borde esfera -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="#e8c84a" stroke-width="5"/>

  <!-- M -->
  <text x="256" y="280"
        font-size="230"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-weight="bold"
        fill="#e8c84a">M</text>

  <!-- 2026 -->
  <text x="256" y="408"
        font-size="88"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="bold"
        fill="#e8c84a"
        opacity="0.85">2026</text>
</svg>
